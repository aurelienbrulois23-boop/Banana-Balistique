<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Niveau 4 — Les lois balistiques</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap');
    :root {
      color-scheme: dark;
      --bronze: #cd7f32; --amber: #ffd24a; --sepia: #d0a878; --parch: #efe2c8;
      --ink: #f5ede4; --muted: #b3aa98; --void: #0a0a12; --panel: rgba(26,20,32,.94);
      --line: rgba(255,255,255,.12); --green: #6ee7a8; --sky: #5ec1ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rajdhani', sans-serif; color: var(--ink);
      background: radial-gradient(circle at 50% -10%, #2a2342 0, #14101f 45%, #07060d 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: clamp(14px,3vw,40px); }
    .app { width: min(820px, 100%); background: var(--panel); border: 1px solid var(--line);
      border-radius: 18px; padding: clamp(20px, 4vw, 38px); box-shadow: 0 22px 60px rgba(0,0,0,.45); position: relative; overflow: hidden; }
    .app::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--sepia), var(--amber), var(--bronze)); }
    .eyebrow { color: var(--amber); font-weight: 900; letter-spacing: .18em; text-transform: uppercase; font-size: .76rem; margin-bottom: 8px; }
    h1, h2, h3 { font-family: 'Orbitron', sans-serif; }
    h1 { font-size: clamp(1.5rem, 4.5vw, 2.3rem); line-height: 1.05; text-transform: uppercase; letter-spacing: -.01em; }
    h2 { color: var(--parch); font-size: 1.2rem; margin-bottom: 12px; border-bottom: 1px solid var(--sepia); padding-bottom: 6px; }
    h3 { color: var(--sepia); font-size: 1.1rem; margin-bottom: 10px; }
    p { line-height: 1.6; font-size: 1.08rem; margin-bottom: 14px; color: #e7ddcf; }
    p strong { color: var(--ink); }
    .lead { color: var(--muted); }
    .card { background: rgba(0,0,0,.34); border-left: 4px solid var(--amber); padding: 18px 20px; border-radius: 6px; margin-bottom: 18px; }
    .formula { font-family: 'Orbitron', sans-serif; color: var(--amber); font-size: 1.15rem; text-align: center;
      background: rgba(255,210,74,.07); border: 1px dashed rgba(255,210,74,.4); border-radius: 8px; padding: 12px; margin: 10px 0; letter-spacing: .02em; }
    .btn { font: inherit; cursor: pointer; border: 1px solid var(--amber); background: transparent; color: var(--amber);
      padding: 13px 20px; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: .95rem;
      text-transform: uppercase; letter-spacing: .06em; width: 100%; margin-top: 8px; transition: .2s; }
    .btn:hover { background: var(--amber); color: var(--void); box-shadow: 0 0 18px rgba(255,210,74,.35); }
    .choice { font: inherit; cursor: pointer; display: block; width: 100%; text-align: left; color: var(--ink);
      background: rgba(255,255,255,.04); border: 1px solid var(--sepia); border-radius: 8px; padding: 14px 16px;
      margin-bottom: 10px; font-size: 1.05rem; transition: .15s; }
    .choice:hover { background: rgba(255,210,74,.14); border-color: var(--amber); }
    .choice.good { background: rgba(110,231,168,.16); border-color: var(--green); }
    .choice.bad { background: rgba(255,107,87,.16); border-color: #ff6b57; }
    .progress { height: 4px; background: rgba(255,255,255,.08); border-radius: 2px; margin-bottom: 18px; overflow: hidden; }
    .progress > span { display: block; height: 100%; background: var(--amber); transition: width .3s; }
    .feedback { font-weight: 700; margin: 4px 0 14px; min-height: 1.2em; }
    .feedback.ok { color: var(--green); } .feedback.no { color: #ff8a78; }
    .demo-wrap { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: #0a1226; margin-bottom: 14px; }
    canvas { display: block; width: 100%; height: auto; }
    .lab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .lab-slider { display: grid; gap: 6px; }
    .lab-slider label { color: var(--muted); font-size: .82rem; font-weight: 700; display: flex; justify-content: space-between; }
    .lab-slider label b { color: var(--amber); font-family: 'Orbitron', sans-serif; }
    input[type=range] { width: 100%; accent-color: var(--amber); cursor: pointer; height: 26px; }
    .readout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat { background: rgba(255,255,255,.04); border: 1px solid var(--line); border-radius: 10px; padding: 10px; text-align: center; }
    .stat .k { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; }
    .stat .v { font-family: 'Orbitron', sans-serif; color: var(--sky); font-size: 1.25rem; margin-top: 4px; }
    .stat.peak .v { color: var(--green); }
    .demo-note { color: var(--sky); font-weight: 700; min-height: 1.3em; margin-bottom: 6px; }
    .badge-done { text-align: center; font-size: 3rem; margin: 6px 0; }
    .muted-small { color: var(--muted); font-size: .85rem; text-align: center; }
    button, input, .choice { touch-action: manipulation; }
    @media (max-width: 620px) {
      body { min-height: 100dvh; padding: 10px; }
      .app { border-radius: 14px; padding: 18px 14px; }
      p { font-size: 1rem; } .btn, .choice { min-height: 48px; }
      .lab-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app" id="app"></main>

  <script src="bb_save.js"></script>
  <script>
    (() => {
      'use strict';
      const app = document.getElementById('app');
      const owner = (window.BB && BB.getOwner && BB.getOwner()) || 'Chevalier';
      const G = 9.8;
      const state = { step: 'intro', card: 0, q: 0, score: 0 };

      const CARDS = [
        { t: "Deux mouvements en un", h: "le secret de la parabole",
          x: "Un tir, ce sont <strong>deux mouvements indépendants</strong> qui s'additionnent. À l'<strong>horizontale</strong> : une vitesse constante, <em>v·cos θ</em> (rien ne la freine). À la <strong>verticale</strong> : la gravité freine la montée puis accélère la chute. Leur mariage dessine la <strong>parabole</strong>.",
          f: "vₓ = v · cos θ &nbsp;&nbsp;|&nbsp;&nbsp; v_y = v · sin θ − g·t" },
        { t: "La portée", h: "jusqu'où ça retombe",
          x: "La distance où le projectile retouche le sol (sans vent) suit cette loi. Conséquence <strong>magique</strong> : sin(2θ) est maximal quand 2θ = 90°, donc <strong>θ = 45° donne la portée maximale</strong>. Plus haut, ça monte… mais ça va moins loin.",
          f: "R = v² · sin(2θ) / g" },
        { t: "La hauteur maximale", h: "le sommet de l'arc",
          x: "La hauteur du sommet de la parabole. Plus tu vises <strong>haut</strong>, plus ça monte — utile pour passer <strong>au-dessus</strong> d'un mur ou d'un immeuble, comme dans tes duels de bananes.",
          f: "H = v² · sin²θ / (2g)" },
        { t: "Le temps de vol", h: "combien de secondes en l'air",
          x: "La durée totale du vol, du départ jusqu'au sol. Doublez l'angle vers le haut, et le projectile <strong>traîne</strong> plus longtemps dans les airs.",
          f: "T = 2 · v · sin θ / g" },
        { t: "Et le vent ?", h: "la variable de ton jeu",
          x: "Ces formules sont <strong>pures</strong> : sans air, sans vent. Dans ton jeu, le <strong>vent ajoute une accélération horizontale</strong> qui tord la parabole. C'est LUI que tu corriges à l'œil — les formules te donnent la base, le vent fait le reste.",
          f: "x_vent ajoute ½ · a_vent · t²" }
      ];

      const QUIZ = [
        { q: "Quel angle donne la portée maximale (sans vent) ?",
          o: ["30°", "45°", "60°", "90°"], a: 1 },
        { q: "Si tu DOUBLES la vitesse v, la portée R est multipliée par…",
          o: ["2 (elle double aussi)", "4 (car R dépend de v²)", "rien, R ne change pas"], a: 1 },
        { q: "Pour passer par-dessus un grand mur juste devant toi, tu joues surtout sur…",
          o: ["la hauteur max H (angle élevé)", "la portée R (angle de 45°)", "le temps de vol uniquement"], a: 0 },
        { q: "La formule de la portée, c'est…",
          o: ["R = v · g / sin θ", "R = v² · sin(2θ) / g", "R = 2g / v²"], a: 1 }
      ];

      function bar(cur, tot) { return `<div class="progress"><span style="width:${Math.round(cur / tot * 100)}%"></span></div>`; }

      function render() {
        if (state.step === 'intro') return renderIntro();
        if (state.step === 'cards') return renderCards();
        if (state.step === 'lab') return renderLab();
        if (state.step === 'quiz') return renderQuiz();
        if (state.step === 'done') return renderDone();
      }

      function renderIntro() {
        app.innerHTML =
          `<p class="eyebrow">Niveau 4 · PIX Sciences · Cours-jeu</p>
           <h1>Les lois<br>balistiques</h1>
           <p class="lead" style="margin-top:14px">Salut, <strong style="color:var(--amber)">${owner}</strong>. Jusqu'ici tu visais <em>au feeling</em>. Mais derrière chaque parabole se cachent <strong>quatre formules</strong>. Apprends-les, et tu pourras <strong>prédire</strong> ton tir au lieu de le deviner — la dernière marche avant le tir calculé.</p>
           <button class="btn" id="go">Ouvrir le manuel</button>`;
        document.getElementById('go').onclick = () => { state.step = 'cards'; state.card = 0; render(); };
      }

      function renderCards() {
        const c = CARDS[state.card];
        app.innerHTML =
          bar(state.card + 1, CARDS.length) +
          `<h2>Loi ${state.card + 1} / ${CARDS.length}</h2>
           <h3>${c.t} <span style="color:var(--muted);font-size:.8rem;font-family:'Rajdhani'">· ${c.h}</span></h3>
           <div class="card"><p style="margin:0">${c.x}</p></div>
           <div class="formula">${c.f}</div>
           <button class="btn" id="next">${state.card < CARDS.length - 1 ? 'Loi suivante' : 'Au laboratoire'}</button>`;
        document.getElementById('next').onclick = () => {
          if (state.card < CARDS.length - 1) { state.card++; render(); }
          else { state.step = 'lab'; render(); }
        };
      }

      function renderLab() {
        app.innerHTML =
          `<h2>Le laboratoire balistique</h2>
           <p>Règle la <strong>vitesse</strong> et l'<strong>angle</strong>, et observe les formules prendre vie. Cherche l'angle qui pousse la <strong>portée</strong> au maximum…</p>
           <div class="demo-wrap"><canvas id="lab" width="720" height="320"></canvas></div>
           <div class="readout">
             <div class="stat" id="statR"><div class="k">Portée R</div><div class="v">—</div></div>
             <div class="stat"><div class="k">Hauteur H</div><div class="v" id="valH">—</div></div>
             <div class="stat"><div class="k">Temps T</div><div class="v" id="valT">—</div></div>
           </div>
           <div class="lab-grid">
             <div class="lab-slider"><label>Vitesse v <b id="lblV">35 m/s</b></label><input id="rV" type="range" min="10" max="60" value="35" step="1"></div>
             <div class="lab-slider"><label>Angle θ <b id="lblA">45°</b></label><input id="rA" type="range" min="10" max="80" value="45" step="1"></div>
           </div>
           <p class="demo-note" id="labNote"></p>
           <button class="btn" id="toQuiz">J'ai compris — au quiz</button>`;
        setupLab();
        document.getElementById('toQuiz').onclick = () => { state.step = 'quiz'; state.q = 0; state.score = 0; render(); };
      }

      function setupLab() {
        const cv = document.getElementById('lab'), ctx = cv.getContext('2d');
        const W = cv.width, H = cv.height, x0 = 34, y0 = H - 24;
        const rV = document.getElementById('rV'), rA = document.getElementById('rA');
        // échelle FIXE (mètres → pixels) pour comparer les tirs honnêtement
        const SCALE = Math.min((W - 60) / 380, (H - 50) / 195);

        function compute(v, th) {
          const r = th * Math.PI / 180;
          return { R: v * v * Math.sin(2 * r) / G, Hm: v * v * Math.sin(r) ** 2 / (2 * G), T: 2 * v * Math.sin(r) / G, r };
        }
        function draw() {
          const v = +rV.value, th = +rA.value, m = compute(v, th);
          document.getElementById('lblV').textContent = v + ' m/s';
          document.getElementById('lblA').textContent = th + '°';
          document.getElementById('statR').querySelector('.v').textContent = m.R.toFixed(0) + ' m';
          document.getElementById('valH').textContent = m.Hm.toFixed(0) + ' m';
          document.getElementById('valT').textContent = m.T.toFixed(1) + ' s';
          const peak = Math.abs(th - 45) <= 1;
          document.getElementById('statR').classList.toggle('peak', peak);
          document.getElementById('labNote').textContent = peak
            ? '🎯 45° : la portée est à son MAXIMUM pour cette vitesse !'
            : (th < 45 ? 'Tir tendu : monte vers 45° pour allonger la portée.' : 'Tir en cloche : tu montes haut, mais tu perds en portée.');
          // fond
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = '#0a1226'; ctx.fillRect(0, 0, W, H);
          ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = 1;
          for (let gx = x0; gx < W; gx += 50) { ctx.beginPath(); ctx.moveTo(gx, 10); ctx.lineTo(gx, y0); ctx.stroke(); }
          for (let gy = y0; gy > 10; gy -= 40) { ctx.beginPath(); ctx.moveTo(x0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
          // sol + axes
          ctx.strokeStyle = '#6ee07a'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(W, y0); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x0, 10); ctx.stroke();
          // parabole
          ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 3; ctx.beginPath();
          const steps = 80;
          for (let i = 0; i <= steps; i++) {
            const t = m.T * i / steps;
            const px = x0 + v * Math.cos(m.r) * t * SCALE;
            const py = y0 - (v * Math.sin(m.r) * t - 0.5 * G * t * t) * SCALE;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.stroke();
          // sommet (H) et impact (R)
          const apexX = x0 + (m.R / 2) * SCALE, apexY = y0 - m.Hm * SCALE;
          const impX = x0 + m.R * SCALE;
          ctx.fillStyle = '#5ec1ff'; ctx.beginPath(); ctx.arc(apexX, apexY, 5, 0, 7); ctx.fill();
          ctx.fillStyle = '#ff6b57'; ctx.beginPath(); ctx.arc(Math.min(impX, W - 4), y0, 5, 0, 7); ctx.fill();
          // canon
          ctx.fillStyle = '#d0a878'; ctx.save(); ctx.translate(x0, y0); ctx.rotate(-m.r); ctx.fillRect(0, -4, 26, 8); ctx.restore();
        }
        rV.addEventListener('input', draw); rA.addEventListener('input', draw);
        draw();
      }

      function renderQuiz() {
        const item = QUIZ[state.q];
        app.innerHTML =
          bar(state.q + 1, QUIZ.length) +
          `<h2>Vérification</h2>
           <p style="color:var(--amber);font-size:1.2rem">${item.q}</p>
           <div id="opts"></div>
           <p class="feedback" id="fb"></p>`;
        const opts = document.getElementById('opts');
        item.o.forEach((txt, i) => {
          const b = document.createElement('button');
          b.className = 'choice'; b.textContent = txt;
          b.onclick = () => answer(i, b);
          opts.appendChild(b);
        });
      }
      function answer(i, btn) {
        const item = QUIZ[state.q], fb = document.getElementById('fb');
        document.querySelectorAll('#opts .choice').forEach(el => el.disabled = true);
        if (i === item.a) { btn.classList.add('good'); state.score++; fb.className = 'feedback ok'; fb.textContent = '✅ Exact !'; }
        else { btn.classList.add('bad'); document.querySelectorAll('#opts .choice')[item.a].classList.add('good'); fb.className = 'feedback no'; fb.textContent = '❌ Raté — la bonne réponse est en vert.'; }
        const next = document.createElement('button');
        next.className = 'btn'; next.textContent = state.q < QUIZ.length - 1 ? 'Question suivante' : 'Terminer le niveau';
        next.onclick = () => { if (state.q < QUIZ.length - 1) { state.q++; render(); } else { finish(); } };
        app.appendChild(next);
      }

      function finish() {
        if (window.BB && typeof BB.markDone === 'function') BB.markDone('N4', { quiz: state.score + '/' + QUIZ.length });
        state.step = 'done'; render();
      }
      function renderDone() {
        app.innerHTML =
          `<p class="eyebrow">Niveau 4 validé</p>
           <div class="badge-done">📐➡️🎯</div>
           <h1>Balisticien diplômé !</h1>
           <p style="margin-top:14px">Score au quiz : <strong>${state.score} / ${QUIZ.length}</strong>. Tu connais maintenant les quatre lois : <strong>portée, hauteur, temps de vol</strong>, et le rôle du <strong>45°</strong>. Tu ne devines plus — tu <strong>calcules</strong>.</p>
           <p><strong style="color:var(--green)">🎯 Niveau 5 — Worms Formules — débloqué.</strong> Le niveau ultime : tu saisis ton calcul, le jeu applique exactement ta formule.</p>
           <button class="btn" id="back">Retour au QG</button>
           <p class="muted-small" style="margin-top:10px">Progression enregistrée dans ton édition.</p>`;
        document.getElementById('back').onclick = () => { window.location.href = 'index.html'; };
      }

      render();
    })();
  </script>
</body>
</html>
